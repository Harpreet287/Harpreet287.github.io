<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Archives — Harpreet's Blog</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css"
    />

    <link rel="stylesheet" href="./styles.css" />

    <script defer src="./scripts.js"></script>
  </head>

  <body data-page="archives">
    <header class="site-header">
      <div class="wrap header-row">
        <a class="site-title" href="./index.html">Harpreet's Blog</a>
        <div class="header-actions">
          <button
            id="themeToggle"
            class="icon-button"
            type="button"
            aria-label="Toggle dark mode"
            title="Toggle dark mode"
          >
            ◐
          </button>
        </div>
      </div>
    </header>

    <main class="wrap" id="content">
      <h1 id="archivesPageTitle" class="visually-hidden">Archives</h1>
      <h2 id="archivesMonthHeading"></h2>
      <div id="archivesStatus" class="muted" role="status" aria-live="polite"></div>

      <ol id="archivesPostsList" class="post-list" aria-live="polite"></ol>

      <p class="archives-back muted">
        <a href="./index.html">← All posts</a>
      </p>
    </main>

    <footer class="site-footer">
      <div class="wrap">
        <span>© 2026 Harpreet's blog</span>
      </div>
    </footer>
  </body>
</html>

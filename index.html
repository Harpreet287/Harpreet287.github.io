<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Harpreet's Blog</title>

    <!-- Computer Modern (LaTeX-style) web fonts -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css"
    />

    <link rel="stylesheet" href="./styles.css" />

    <script defer src="./scripts.js"></script>
  </head>

  <body data-page="home">
    <header class="site-header">
      <div class="wrap header-row">
        <a class="site-title" href="./index.html">Harpreet's Blog</a>
        <div class="header-actions">
          <button
            id="searchToggle"
            class="icon-button"
            type="button"
            aria-label="Search posts"
            title="Search (/)"
            aria-expanded="false"
            aria-controls="headerSearchField"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
              focusable="false"
            >
              <path
                d="M10.5 18.5a8 8 0 1 1 0-16 8 8 0 0 1 0 16Z"
                stroke="currentColor"
                stroke-width="2"
              />
              <path
                d="M16.2 16.2 21 21"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>

          <div id="headerSearchField" class="header-search-field" aria-hidden="true">
            <label class="visually-hidden" for="searchInput">Search posts</label>
            <div class="header-search-inputwrap">
              <input
                id="searchInput"
                class="header-search-input"
                type="search"
                inputmode="search"
                autocomplete="off"
                placeholder="Search titles, tags, and content…"
                tabindex="-1"
              />
              <button
                id="searchClear"
                class="header-search-clear"
                type="button"
                aria-label="Clear search"
                title="Clear"
                tabindex="-1"
              >
                ✕
              </button>
            </div>
          </div>

          <button
            id="themeToggle"
            class="icon-button"
            type="button"
            aria-label="Toggle dark mode"
            title="Toggle dark mode"
          >
            ◐
          </button>
        </div>
      </div>
    </header>

    <main class="wrap" id="content">
      <h1>Posts</h1>
      <div id="homeStatus" class="muted" role="status" aria-live="polite"></div>

      <ol id="postsList" class="post-list" aria-live="polite">
        <!-- Posts are injected here by scripts.js -->
      </ol>
    </main>

    <footer class="site-footer">
      <div class="wrap">
        <span>© 2026 Harpreet's blog • Markdown-first • GitHub Pages-ready</span>
      </div>
    </footer>
  </body>
</html>

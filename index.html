<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>My Blog</title>

    <!-- Computer Modern (LaTeX-style) web fonts -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css"
    />

    <link rel="stylesheet" href="./styles.css" />

    <!-- Fuse.js (client-side search) -->
    <script defer src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

    <script defer src="./scripts.js"></script>
  </head>

  <body data-page="home">
    <header class="site-header">
      <div class="wrap header-row">
        <a class="site-title" href="./index.html">My Blog</a>
        <div class="header-actions">
          <button
            id="themeToggle"
            class="icon-button"
            type="button"
            aria-label="Toggle dark mode"
            title="Toggle dark mode"
          >
            ◐
          </button>
        </div>
      </div>
    </header>

    <main class="wrap" id="content">
      <h1>Posts</h1>

      <section class="home-controls" aria-label="Post controls">
        <label class="search" for="searchInput">
          <span class="visually-hidden">Search posts</span>
          <input
            id="searchInput"
            type="search"
            inputmode="search"
            autocomplete="off"
            placeholder="Search titles, tags, and content…"
          />
        </label>

        <div class="tag-filters-row">
          <div id="tagFilters" class="tag-filters" aria-label="Filter by tag"></div>
          <button id="clearFilters" class="text-button" type="button" hidden>
            Clear
          </button>
        </div>

        <div id="homeStatus" class="muted" role="status" aria-live="polite"></div>
      </section>

      <ol id="postsList" class="post-list" aria-live="polite">
        <!-- Posts are injected here by scripts.js -->
      </ol>
    </main>

    <footer class="site-footer">
      <div class="wrap">
        <span>© 2026 My Blog • Markdown-first • GitHub Pages-ready</span>
      </div>
    </footer>
  </body>
</html>

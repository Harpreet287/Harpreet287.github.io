<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Contributions — Harpreet's Blog</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./scripts.js"></script>
  </head>

  <body data-page="contributions">
    <header class="site-header">
      <div class="wrap-wide header-row">
        <a class="site-title" href="./index.html">Harpreet's Blog</a>
        <div class="header-actions">
          <a class="text-button" href="./index.html">Posts</a>
          <button
            id="themeToggle"
            class="icon-button"
            type="button"
            aria-label="Toggle dark mode"
            title="Toggle dark mode"
          >
            ◐
          </button>
        </div>
      </div>
    </header>

    <main class="wrap-wide" id="content">
      <h1>Pending contributions</h1>
      <div id="contribStatus" class="muted" role="status" aria-live="polite"></div>

      <div id="contribFilters" class="contrib-filters" hidden></div>
      <div id="contribList" class="contrib-list" aria-live="polite"></div>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true" hidden></div>

    <footer class="site-footer">
      <div class="wrap-wide">
        <span>© 2026 Harpreet's blog</span>
      </div>
    </footer>
  </body>
</html>
